<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body{
    margin:0;
    overflow:hidden;
    background:#111827;
}
#game{

    width:100vw;
    height:100vh;
    position: relative;
    overflow: hidden;
    background-size: contain;

#player{
    width: 48px;
    height: 48px;
    position: absolute;
    left: 100px;
    top: 100px;
    object-fit: contain;
    z-index:10;
}

#cachorra{

    width:90px;
    height:90px;

    position:absolute;

    left:1020px;

    top:70px;

    z-index:10;

}

#intro{
    position: fixed;
    inset: 0;

    background: linear-gradient(
        135deg,
        #1f2937,
        #111827
    );

    color: white;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

#intro-box{
    width: 700px;
    max-width: 90%;

    background: rgba(255,255,255,0.08);

    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 20px;

    padding: 40px;

    text-align: center;

    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

#intro-box h1{
    font-size: 42px;
    margin-bottom: 20px;
}

#intro-box p{
    font-size: 20px;
    line-height: 1.6;
}

#startBtn{
    margin-top: 25px;

    background: #22c55e;
    color: white;

    border: none;
    border-radius: 10px;

    padding: 15px 35px;

    font-size: 22px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;
}

#startBtn:hover{
    transform: scale(1.05);
    background: #16a34a;
}








#mapa{

    position:absolute;

    left:50%;
    top:50%;

    width:115%;
    height:115%;

    transform:translate(-50%,-50%);

    object-fit:cover;

    z-index:0;
}
#joystick{

    display:none;

    position:fixed;

    left:15px;
    bottom:15px;

    z-index:9999;
}

#joystick button{

    width:70px;
    height:70px;

    font-size:28px;

    border:none;

    border-radius:15px;

    background:#374151;

    color:white;
}
#joystick{
    display:none;
}


#cenaFinal{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(5,10,25,.96);
    backdrop-filter:blur(8px);

    opacity:0;
    visibility:hidden;

    transition:.8s;

    z-index:99999;
}
#status{

    position:fixed;

    top:15px;
    left:50%;

    transform:translateX(-50%);

    z-index:9999;

    color:white;

    background:rgba(0,0,0,.5);

    padding:10px 20px;

    border-radius:15px;

}

#cenaFinal.ativo{
    opacity:1;
    visibility:visible;
}

#cenaBox{

    width:700px;
    max-width:90vw;

    padding:35px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;
}
#cenaBox h2{

    font-size:46px;

    color:#FFD54A;

    text-shadow:
        0 0 10px #FFD54A,
        0 0 25px rgba(255,213,74,.5);

    margin-bottom:25px;
}

#textoCena{

    width:90%;

    min-height:120px;

    color:white;

    font-size:30px;

    line-height:1.8;

    text-align:center;

    text-shadow:
        0 2px 6px rgba(0,0,0,.5);
}

#fotoMemoria{

    width:min(220px,60vw);

    height:auto;

    display:block;

    object-fit:contain;

    margin:25px 0;

    border-radius:25px;

    border:6px solid white;

    box-shadow:

        0 0 25px white,

        0 0 60px rgba(255,255,255,.4);

    transform:scale(.6) rotate(-5deg);

    opacity:0;

    transition:1.5s;
}

#fotoMemoria.mostrar{

    opacity:1;

    transform:scale(1) rotate(0deg);

}


#voltarCasa{

    display:none;

    margin-top:35px;

    padding:18px 45px;

    font-size:24px;

    font-weight:bold;

    color:white;

    border:none;

    border-radius:18px;

    cursor:pointer;

    background:linear-gradient(
        45deg,
        #22c55e,
        #16a34a
    );

    box-shadow:
        0 0 20px rgba(34,197,94,.5);

    transition:.3s;
}

#voltarCasa:hover{

    transform:scale(1.08);

    box-shadow:
        0 0 35px rgba(34,197,94,.9);

}
#agua{
    width:40px;
    height:40px;

    position:absolute;

    left:140px;
    top:520px;
}

#bife{
    width:40px;
    height:40px;
    position:absolute;
    left:850px;
    top:320px;
    z-index:10;
}

    </style>
</head>  
<body>

<div id="intro">

    <div id="intro-box">

        <h1>🐶 A Cachorrinha das Colinas</h1>

<p>
Uma cachorrinha perdida foi vista no topo das Colinas.
</p>

<p>
Encontre uma garrafa de água e um pedaço de bife.
Depois leve os itens para ela e conquiste sua confiança.
</p>

        <h3>🎮 Controles</h3>

        <p>W • A • S • D</p>

        <button id="startBtn">
            Começar Missão
        </button>
        

    </div>

</div></div>
    <p id="status">
🐶 Encontre água e bife para ajudar Amora.
</p>

<div id="game">
    <img src="images/fundoColinas.jpeg" id="mapa">
    <img src="images/tataFRENTE.png" id="player">
    <img src="images/agua.png" id="agua">
    <img src="images/bife.png" id="bife">
    <img src="images/amora.png" id="cachorra">
    <img id="collisionMap" src="images/colinasColisao.jpg" style="display:none">    

    <div class="obstaculo" style="left:200px;top:100px;"></div>
    <div class="obstaculo" style="left:400px;top:250px;"></div>
    <div class="obstaculo" style="left:600px;top:150px;"></div>
</div>
<div id="joystick">

    <button id="up">⬆️</button>

    <div>
        <button id="left">⬅️</button>
        <button id="right">➡️</button>
    </div>

    <button id="down">⬇️</button>

</div>


<div id="cenaFinal">

    <div id="cenaBox">

        <h2>🌟 Missão Completa</h2>

        <p id="textoCena">
            ...
        </p>

        <img
            id="fotoMemoria" src="images/recompensaAmora.jpeg"></img>

           
    </div>
 <button id="voltarCasa">
                🏠 Voltar para Casa
            </button>
</div>
    <script>
        const player = document.getElementById("player");

        const agua =
document.getElementById("agua");

const bife =
document.getElementById("bife");

const cachorra =
document.getElementById("cachorra");

const statusText = document.getElementById("status");

let cenaFinalIniciada = false;

let px = 100;
let py = 100;

let temAgua = false;
let temBife = false;
let cachorraDomesticada = false;

const teclas = {};

document.addEventListener("keydown", (e) => {
    teclas[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
    teclas[e.key.toLowerCase()] = false;
});

function criarControleTouch(id, tecla){

    const botao = document.getElementById(id);

    botao.addEventListener("touchstart", (e)=>{

        e.preventDefault();

        teclas[tecla] = true;

    });

    botao.addEventListener("touchend", ()=>{

        teclas[tecla] = false;

    });

}

document.addEventListener(
    "keydown",
    (e)=>{

        if(e.code === "KeyE"){

            interagir();

        }

    }
);


criarControleTouch("up","w");
criarControleTouch("down","s");
criarControleTouch("left","a");
criarControleTouch("right","d");



function esperar(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}





function escrever(texto, velocidade = 40){

    return new Promise(resolve=>{

        const area = document.getElementById("textoCena");

        area.textContent = "";

        let i = 0;

        const intervalo = setInterval(()=>{

            area.textContent += texto[i];

            i++;

            if(i >= texto.length){

                clearInterval(intervalo);

                resolve();

            }

        }, velocidade);

    });

}



async function mostrarCenaFinal(){

    if(cenaFinalIniciada) return;

    cenaFinalIniciada = true;

    const tela = document.getElementById("cenaFinal");

    tela.classList.add("ativo");
await escrever(
"🐶 Amora estava perdida e precisava de ajuda."
);

await esperar(2500);

await escrever(
"💧 Você compartilhou sua água."
);

await esperar(2500);

await escrever(
"🥩 Você dividiu sua comida."
);

await esperar(2500);

await escrever(
"💛 E assim nasceu uma nova amizade."
);

await esperar(2500);

await escrever(
"📷 Algumas memórias são encontradas."
);

await esperar(2500);

await escrever(
"✨ Outras são criadas."
);

    document
        .getElementById("fotoMemoria")
        .classList.add("mostrar");

    await esperar(3000);

    await escrever("✨ MEMÓRIA DESBLOQUEADA ✨");

    document.getElementById("voltarCasa").style.display = "inline-block";
}
const collisionImg =
document.getElementById("collisionMap");

const collisionCanvas =
document.createElement("canvas");

const collisionCtx =
collisionCanvas.getContext("2d");

let collisionData = null;

collisionImg.onload = () => {

    collisionCanvas.width =
    collisionImg.width;

    collisionCanvas.height =
    collisionImg.height;

    collisionCtx.drawImage(
        collisionImg,
        0,
        0
    );

    collisionData =
    collisionCtx.getImageData(
        0,
        0,
        collisionImg.width,
        collisionImg.height
    ).data;
};

function pontoBloqueado(x,y){

    if(!collisionData) return false;

    const mapa =
    document.getElementById("mapa");

    const rect =
    mapa.getBoundingClientRect();

    const imgX =
    Math.floor(
        (x - rect.left)
        * collisionImg.width
        / rect.width
    );

    const imgY =
    Math.floor(
        (y - rect.top)
        * collisionImg.height
        / rect.height
    );

    if(
        imgX < 0 ||
        imgY < 0 ||
        imgX >= collisionImg.width ||
        imgY >= collisionImg.height
    ){
        return true;
    }

    const index =
    (imgY * collisionImg.width + imgX) * 4;

    const r = collisionData[index];
    const g = collisionData[index + 1];
    const b = collisionData[index + 2];

    // Branco = bloqueado
    return r > 200 && g > 200 && b > 200;
}

function colisaoJogador(x,y){

    const largura = 24;
    const altura = 24;

    const offsetX = 12;
    const offsetY = 20;

    return (
        pontoBloqueado(x + offsetX, y + offsetY) ||
        pontoBloqueado(x + offsetX + largura, y + offsetY) ||
        pontoBloqueado(x + offsetX, y + offsetY + altura) ||
        pontoBloqueado(x + offsetX + largura, y + offsetY + altura)
    );
}


function atualizar() {

    let novoX = px;
    let novoY = py;
    

    const velocidade = 4;

    let dx = 0;
    let dy = 0;

if (teclas["w"]) {
    dy--;
    player.src = "images/tataCOSTA.png";
}

if (teclas["s"]) {
    dy++;
    player.src = "images/tataFRENTE.png";
}

if (teclas["a"]) {
    dx--;
    player.src = "images/tataESQUERDA.png";
}

if (teclas["d"]) {
    dx++;
    player.src = "images/tataDIREITA.png";
}

    if (dx !== 0 || dy !== 0) {

        const tamanho = Math.sqrt(dx * dx + dy * dy);

        dx /= tamanho;
        dy /= tamanho;

        novoX += dx * velocidade;
        novoY += dy * velocidade;
    }

  const game =
document.getElementById("game");

novoX = Math.max(
    0,
    Math.min(
        novoX,
        game.clientWidth - player.offsetWidth
    )
);

novoY = Math.max(
    0,
    Math.min(
        novoY,
        game.clientHeight - player.offsetHeight
    )
);

    player.style.left = novoX + "px";
    player.style.top = novoY + "px";

    if(!colisaoJogador(novoX, novoY)){
    px = novoX;
    py = novoY;
}
    if(
    !temAgua &&
    colidiu(
        player.getBoundingClientRect(),
        agua.getBoundingClientRect()
    )
){

    statusText.textContent =
    "💧 Aperte E para pegar a água";
}
else if(
    !temBife &&
    colidiu(
        player.getBoundingClientRect(),
        bife.getBoundingClientRect()
    )
){

    statusText.textContent =
    "🥩 Aperte E para pegar o bife";
}
else if(
    temAgua &&
    temBife &&
    colidiu(
        player.getBoundingClientRect(),
        cachorra.getBoundingClientRect()
    )
){

    statusText.textContent =
    "🐶 Aperte E para ajudar Amora";
}

    requestAnimationFrame(atualizar);
}

function colidiu(a, b) {
    return (
        a.left < b.right &&
        a.right > b.left &&
        a.top < b.bottom &&
        a.bottom > b.top
    );

}
function interagir(){

    const jogador =
    player.getBoundingClientRect();

    if(
        !temAgua &&
        colidiu(
            jogador,
            agua.getBoundingClientRect()
        )
    ){

        temAgua = true;

        agua.style.display = "none";

        statusText.textContent =
        "🥩 Ótimo! Agora procure algo para alimentar Amora.";

        return;
    }

    if(
        !temBife &&
        colidiu(
            jogador,
            bife.getBoundingClientRect()
        )
    ){

        temBife = true;

        bife.style.display = "none";

        statusText.textContent =
        "🐶 Leve a água e o bife até Amora no topo da colina.";

        return;
    }

    if(
        temAgua &&
        temBife &&
        colidiu(
            jogador,
            cachorra.getBoundingClientRect()
        )
    ){

        cachorraDomesticada = true;

        statusText.textContent =
        "💛 Amora agora confia em você.";

        mostrarCenaFinal();

    }

}

function concluirCondominio(){

    const progresso = JSON.parse(
        localStorage.getItem("progresso")
    ) || {};

    progresso.colinas = true;

    localStorage.setItem(
        "progresso",
        JSON.stringify(progresso)
    );

}

document.getElementById("voltarCasa").addEventListener("click", () => {

    concluirCondominio();

    window.location.href = "index.html";

});
   
    </script>
    <script>
document.getElementById("startBtn").addEventListener("click", () => {


    document.getElementById("intro").style.display = "none";

    atualizar();

});
    </script>
</body>
