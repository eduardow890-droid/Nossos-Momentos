<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa Principal</title>

<link rel="stylesheet" href="css/style.css">
<style>
    .personagemDialogo img{

    width:100px;

    border-radius:50%;

    border:3px solid #FFD700;

}
</style>
</head>
<body>

    <canvas id="jogo"></canvas>
    <div id="intro">

    <div id="introContent">

        <h1>💜 Nossos Momentos</h1>
<p>
    🎮 Controles:
</p>

<p>
    ⬅ ⬆ ⬇ ➡ Movimentar personagem
</p>

<p>
     Tecla <strong>E</strong> para interagir com os locais
</p>
        <button id="btnIniciar">
            ✨ Iniciar Jornada
        </button>

    </div>

</div>


<div id="dialogo">

<div class="personagemDialogo">

    <img src="images/namoraPIXEL.jpg" alt="Personagem">

</div>

    <h3 id="nomePersonagem">
        Namorado
    </h3>

    <p id="textoDialogo"></p>

    <button onclick="proximaFala()">
        Próximo
    </button>

</div>
    <div id="historia"></div>

    <div id="mensagem">
        Pressione <strong>E</strong> para entrar
    </div>
<div id="mobileControls">

    <div class="dpad">
        <div class="empty"></div>
        <button id="up">⬆</button>
        <div class="empty"></div>

        <button id="left">⬅</button>
        <div class="empty"></div>
        <button id="right">➡</button>

        <div class="empty"></div>
        <button id="down">⬇</button>
        <div class="empty"></div>
    </div>

    <button id="enter">E</button>

</div>
 <script src="js/mapa2.js"></script>
 <script src="js/mobil.js"></script>
 <script>
const introJaVista = sessionStorage.getItem("introVista");

if (introJaVista === "true") {
    document.getElementById("intro").style.display = "none";
}

document
.getElementById("btnIniciar")
.addEventListener("click", () => {

    sessionStorage.setItem("introVista", "true");

    document.getElementById("intro").style.display = "none";
}); </script>
</div>

</body>
</html>
